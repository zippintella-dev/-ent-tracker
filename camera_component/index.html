<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    html, body { margin: 0; padding: 0; height: 58px; overflow: hidden; }
    label {
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 58px;
      background: #ff4b4b; color: #fff;
      font: 600 15px/1 sans-serif; border-radius: 8px; cursor: pointer;
    }
    input { display: none; }
  </style>
</head>
<body>
  <label id="lbl">📷 Take Photo<input type="file" accept="image/*" capture="environment" id="inp"></label>

  <script>
    var P = window.parent;
    function send(t, x) { P.postMessage(Object.assign({ type: t }, x || {}), "*"); }

    // Single delayed announce — avoids flooding Streamlit with componentReady
    setTimeout(function () {
      send("streamlit:componentReady", { apiVersion: 1 });
      send("streamlit:setFrameHeight", { height: 58 });
    }, 100);

    window.addEventListener("message", function (e) {
      if (!e.data || e.data.type !== "streamlit:render") return;
      send("streamlit:setFrameHeight", { height: 58 });
      var lbl = (e.data.args || {}).label;
      if (lbl) document.getElementById("lbl").firstChild.textContent = "📷 " + lbl;
    });

    document.getElementById("inp").addEventListener("change", function (e) {
      var f = e.target.files[0];
      if (!f) return;
      var r = new FileReader();
      r.onload = function (ev) {
        var img = new Image();
        img.onload = function () {
          var max = 1280, q = 0.82;
          var ratio = Math.min(1, max / Math.max(img.width, img.height));
          var c = document.createElement("canvas");
          c.width = Math.round(img.width * ratio);
          c.height = Math.round(img.height * ratio);
          c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
          document.getElementById("lbl").firstChild.textContent = "✅ Captured";
          document.getElementById("lbl").style.background = "#21c354";
          send("streamlit:setFrameHeight", { height: 58 });
          send("streamlit:setComponentValue", { value: c.toDataURL("image/jpeg", q), dataType: "json" });
        };
        img.src = ev.target.result;
      };
      r.readAsDataURL(f);
    });
  </script>
</body>
</html>
