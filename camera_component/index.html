<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/streamlit-component-lib/dist/StreamlitLib.bundle.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { padding: 4px 4px 10px; font-family: sans-serif; }
        .btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 11px 16px;
            background: #ff4b4b; color: white;
            font-size: 15px; font-weight: 600;
            border-radius: 8px; cursor: pointer;
            border: none; outline: none;
        }
        .btn:active { opacity: 0.75; }
        input[type=file] { display: none; }
        .done {
            display: none; text-align: center;
            color: #21c354; font-size: 14px; padding: 8px 0;
        }
    </style>
</head>
<body>
    <button class="btn" id="btn">📷 Take Photo</button>
    <input type="file" id="inp" accept="image/*" capture="environment">
    <div class="done" id="done">✅ Captured</div>

    <script>
        Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, function (ev) {
            var args = ev.detail.args || {};
            if (args.label) {
                document.getElementById('btn').textContent = '📷 ' + args.label;
            }
            Streamlit.setFrameHeight();
        });

        Streamlit.setComponentReady();

        document.getElementById('btn').addEventListener('click', function () {
            document.getElementById('inp').click();
        });

        document.getElementById('inp').addEventListener('change', function (e) {
            var file = e.target.files[0];
            if (!file) return;

            var reader = new FileReader();
            reader.onload = function (ev) {
                var img = new Image();
                img.onload = function () {
                    // Resize to max 1280 px and compress to JPEG 82 %
                    var maxDim = 1280, quality = 0.82;
                    var ratio = Math.min(1, maxDim / Math.max(img.width, img.height));
                    var canvas = document.createElement('canvas');
                    canvas.width  = Math.round(img.width  * ratio);
                    canvas.height = Math.round(img.height * ratio);
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);

                    document.getElementById('btn').style.display = 'none';
                    document.getElementById('done').style.display = 'block';
                    Streamlit.setFrameHeight();

                    Streamlit.setComponentValue(canvas.toDataURL('image/jpeg', quality));
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
